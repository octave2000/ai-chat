services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: llm_chat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d llm_chat"]
      interval: 5s
      timeout: 5s

  backend:
    build:
      context: ./backend
    environment:
      PORT: 3001
      FRONTEND_ORIGIN: http://localhost:5173
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/llm_chat
      AI_API_KEY: ${AI_API_KEY}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_PROVIDER_NAME: ${AI_PROVIDER_NAME:-openai-compatible}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3001
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
